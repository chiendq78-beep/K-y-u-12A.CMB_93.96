<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <defs>
    <!-- Gradiente màu vàng ghim lấp lánh sang trọng (Vintage Gold) -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE082" />
      <stop offset="35%" stop-color="#FFD54F" />
      <stop offset="70%" stop-color="#FFB300" />
      <stop offset="100%" stop-color="#FF8F00" />
    </linearGradient>
    
    <!-- Bộ lọc tạo hiệu ứng phát sáng nhẹ nhàng cho bụi vàng lấp lánh -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Các ngôi sao phép thuật (Sparkles) bay ra từ cuốn sách kỷ cổ điển -->
  <!-- Ngôi sao lớn trung tâm -->
  <path d="M32,4 L34.5,10 L40.5,12 L34.5,14 L32,20 L29.5,14 L23.5,12 L29.5,10 Z" fill="url(#gold-grad)" filter="url(#glow)" />
  <!-- Ngôi sao bên trái -->
  <path d="M17,11 L18.5,14 L21.5,15 L18.5,16 L17,19 L15.5,16 L12.5,15 L15.5,14 Z" fill="url(#gold-grad)" filter="url(#glow)" />
  <!-- Ngôi sao bên phải -->
  <path d="M47,13 L48.2,16 L51,17 L48.2,18 L47,21 L45.8,18 L43,17 L45.8,16 Z" fill="url(#gold-grad)" filter="url(#glow)" />
  
  <!-- Các hạt bụi vàng nhỏ bay lửng loơ -->
  <circle cx="25" cy="22" r="1.2" fill="url(#gold-grad)" opacity="0.9" />
  <circle cx="39" cy="20" r="1" fill="url(#gold-grad)" opacity="0.85" />
  <circle cx="14" cy="27" r="1" fill="url(#gold-grad)" opacity="0.8" />
  <circle cx="50" cy="26" r="1.2" fill="url(#gold-grad)" opacity="0.9" />

  <!-- Vẽ cuốn sách đang mở với các đường nét thanh mảnh, tỷ lệ lớn rõ nét -->
  <!-- Bìa sách ngoài dày dặn -->
  <path d="M32,48 C22.5,47.2 12,41 6,44 L6,22.5 C12,19.5 22.5,25.8 32,26.5" fill="none" stroke="url(#gold-grad)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M32,48 C41.5,47.2 51,41 57,44 L57,22.5 C51,19.5 41.5,25.8 32,26.5" fill="none" stroke="url(#gold-grad)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" />

  <!-- gáy giữa sách cổ -->
  <path d="M32,26.5 L32,50" stroke="url(#gold-grad)" stroke-width="3" stroke-linecap="round" />

  <!-- Lớp giấy trong tạo chiều sâu cho cuốn sách nhiều trang -->
  <path d="M32,44.5 C23.5,43.7 14,38.5 8,41.2 L8,24.5 C14,21.8 23.5,27.5 32,28.2" fill="none" stroke="url(#gold-grad)" stroke-width="1.3" stroke-linecap="round" opacity="0.85" />
  <path d="M32,44.5 C40.5,43.7 50,38.5 56,41.2 L56,24.5 C50,21.8 40.5,27.5 32,28.2" fill="none" stroke="url(#gold-grad)" stroke-width="1.3" stroke-linecap="round" opacity="0.85" />

  <!-- Dải ruy băng bookmark cổ điện mềm mại -->
  <path d="M32,49 Q34,55 29,60" fill="none" stroke="url(#gold-grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
</svg>
